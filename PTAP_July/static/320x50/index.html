<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
 "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
 <head>
  <title>320x50 Mobile Banner</title>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <script type="text/javascript">
    var clickTag = "https://www.zurzuvae.com/";
  </script>
  <style type="text/css">
    html, body, a, .container { margin:0; padding:0; width: 320px; height: 50px; display: block; }
    body, a { overflow: hidden }
    .container {
        border: 1px solid black;
    }
    .main {
        width: 320px;
        height: 50px;
    }
  </style>
 </head>
 <body>
  <div class="container">
    <a href="javascript:window.open(window.clickTag)">
      <img class="main" src="./images/main.jpg" alt="img" />
    </a>
  </div>
 </body>
</html>
