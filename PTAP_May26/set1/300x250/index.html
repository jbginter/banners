 <script>
  const elements = {
    copy1: document.querySelector('.copy1'),
    image1: document.querySelector('.image1'),
    legal: document.querySelector('.legal'),
    underline: document.querySelector('.underline'),
    copy2: document.querySelector('.copy2'),
    logo: document.querySelector('.logo'),
    copy3: document.querySelector('.copy3'),
    copy4: document.querySelector('.copy4'),
    cta: document.querySelector('.cta'),
    legalCopy: document.querySelector('.legal-container'),
  };
  let isMouseOver = false; // is mouse over legal copy
  const totalScrollTime = 210000; // 3min30sec
  let updatedScrollTime = 210000; // match top
  let totalElapsedValue = 0; // total elapsed in ms
  let doneScroll = false; // done scrolling legal copy?
  let allowAuto = false; // stop legal copy scroll after animations if user has scrolled
  //frame 1
  setTimeout(() => {
    elements.copy1.classList.add('fade-in');
    elements.image1.classList.add('fade-in');
    //elements.legal.classList.add('fade-in');
  }, 100);
  setTimeout(() => {
    elements.underline.classList.add('fade-in', 'extend1');
  }, 600);
  setTimeout(() => {
    elements.copy1.classList.remove('fade-in');
    elements.image1.classList.remove('fade-in');
    //elements.legal.classList.remove('fade-in');
    elements.underline.classList.remove('fade-in');
  }, 6500);
  //frame 2
  // setTimeout(() => {
  //   elements.copy2.classList.add('fade-in');
  //   elements.logo.classList.add('fade-in');
  //   elements.underline.classList.add('new-position');
  //   elements.underline.classList.remove('extend1');
  // }, 3000);
  // setTimeout(() => {
  //   elements.underline.classList.add('fade-in', 'extend2');
  // }, 3500);
  // setTimeout(() => {
  //   elements.copy2.classList.remove('fade-in');
  //   elements.underline.classList.remove('fade-in');
  // }, 5500);
  //frame 3
  setTimeout(() => {
    elements.logo.classList.add('fade-in');
    elements.copy3.classList.add('fade-in');
  }, 7000);
  setTimeout(() => {
    elements.copy3.classList.remove('fade-in');
  }, 14000);
  //frame 4
  setTimeout(() => {
    elements.copy4.classList.add('fade-in');
    elements.cta.classList.add('fade-in');
  }, 14500);
  setTimeout(() => {
    allowAuto = true;
    if (updatedScrollTime === 210000) {
      slowScroll(elements.legalCopy, updatedScrollTime);
    } else {
      slowScroll(elements.legalCopy, (totalScrollTime - updatedScrollTime) - totalElapsedValue);
    }
  }, 15000);

  elements.legalCopy.addEventListener('mouseenter', (event) => {
    isMouseOver = true;
  });

  elements.legalCopy.addEventListener('mouseleave', (event) => {
    const scrollPercent = (elements.legalCopy.scrollTop / elements.legalCopy.scrollHeight);
    updatedScrollTime = totalScrollTime * scrollPercent;
    isMouseOver = false;
    if (!doneScroll && allowAuto) {
      slowScroll(elements.legalCopy, (totalScrollTime - updatedScrollTime) - totalElapsedValue);
    }
  });
  

  function slowScroll(element, duration) {
    const start = element.scrollTop;
    const end = element.scrollHeight - element.clientHeight;
    const startTime = performance.now();

    function animateScroll(currentTime) {
      const timeElapsed = currentTime - startTime;
      const progress = Math.min(timeElapsed / duration, 1);
      totalElapsedValue = timeElapsed;
      element.scrollTop = start + (end - start) * progress;

      if (progress < 1 && !isMouseOver) {
        requestAnimationFrame(animateScroll);
      } else if (progress === 1) {
        doneScroll = true;
      }
    }
    if (!isMouseOver && !doneScroll) {
      requestAnimationFrame(animateScroll);
    }
    
  }

 </script>
